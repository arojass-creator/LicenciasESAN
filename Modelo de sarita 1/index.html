<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Control de Licencias ESAN</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/estilos.css') }}">

</head>

<body>

<!-- BANNER -->

<div class="banner">

    <span class="banner-logo">ESAN</span>

    <span class="banner-subtitulo">Control de Licencias de Software</span>

</div>

<div class="contenedor">

    <!-- PANEL IZQUIERDO -->

    <div class="panel lista">

        <div class="titulo">
            <i class="ti ti-layout-list" aria-hidden="true"></i> Lista de Software
            <span style="
                float:right;
                font-size:14px;
                font-weight:600;
                background:#6366f1;
                color:#fff;
                padding:2px 12px;
                border-radius:20px;
                vertical-align:middle;
                letter-spacing:0.3px;
            ">{{ programas|length }} programas</span>
        </div>

        <div class="buscador-area">

            <div class="buscador-ilustracion">
                <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="4" y="6" width="28" height="32" rx="4" fill="#c7d2fe"/>
                    <rect x="7" y="10" width="18" height="3" rx="1.5" fill="#6366f1"/>
                    <rect x="7" y="16" width="14" height="3" rx="1.5" fill="#a5b4fc"/>
                    <rect x="7" y="22" width="16" height="3" rx="1.5" fill="#a5b4fc"/>
                    <rect x="7" y="28" width="10" height="3" rx="1.5" fill="#a5b4fc"/>
                    <circle cx="32" cy="34" r="7" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
                    <circle cx="30" cy="32" r="3.5" stroke="#6366f1" stroke-width="2"/>
                    <line x1="32.8" y1="34.8" x2="36" y2="38" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>

            <div class="buscador-derecha">
                <i class="ti ti-search buscador-icono" aria-hidden="true"></i>
                <input
                    type="text"
                    id="buscador"
                    class="buscador"
                    placeholder="Buscar programa..."
                    onkeyup="filtrarProgramas()">
            </div>

        </div>

        <div class="tabla-contenedor">

            <table id="tablaProgramas">

                <thead>

                    <tr>
                        <th>Item</th>
                        <th>Nombre</th>
                    </tr>

                </thead>

                <tbody>

                {% for programa in programas %}

                    <tr onclick="seleccionarPrograma({{ programa.id }}, this)">

                        <td>{{ programa.item }}</td>
                        <td>{{ programa.nombre }}</td>

                    </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

    <!-- PANEL AMBIENTES -->

    <div class="panel panel-ambientes">

        <div class="titulo" id="titulo-ambientes">
            <i class="ti ti-building" aria-hidden="true"></i> Ambientes Donde se Usa
        </div>

        <div id="ambientes">

            Seleccione un programa...

        </div>

    </div>

    <!-- PANEL DETALLES -->

    <div class="panel panel-detalles">

        <div class="titulo">
            <i class="ti ti-info-circle" aria-hidden="true"></i> Detalles del Software
        </div>

        <div id="detalle">

            Seleccione un programa...

        </div>

    </div>

</div>

<script>

async function seleccionarPrograma(id, fila){

    document
    .querySelectorAll("#tablaProgramas tbody tr")
    .forEach(f =>
        f.classList.remove("seleccionado")
    );

    fila.classList.add("seleccionado");

    const respuesta =
        await fetch("/programa/" + id);

    const datos =
        await respuesta.json();

    mostrarAmbientes(datos.ambientes);

    document
    .getElementById("detalle")
    .innerHTML = `

        <div class="detalle-card">
            <span class="detalle-label">Nombre del Programa</span>
            <span class="detalle-valor">${datos.programa}</span>
        </div>

        <div class="detalle-card">
            <span class="detalle-label">Versión</span>
            <span class="detalle-valor">${datos.version}</span>
        </div>

        <div class="detalle-card">
            <span class="detalle-label">Tipo de Licencia</span>
            <span class="detalle-valor">${datos.licencia}</span>
        </div>

        <div class="detalle-card">
            <span class="detalle-label">Cantidad de Licencias</span>
            <span class="detalle-valor ${datos.cantidad_licencias !== 'Ilimitado' ? 'numero' : ''}">${datos.cantidad_licencias}</span>
        </div>

        <div class="detalle-card">
            <span class="detalle-label">Total Ambientes</span>
            <span class="detalle-valor">${datos.ambientes.length}</span>
        </div>

    `;
}

function mostrarAmbientes(lista){

    // Actualizar título con conteo
    document.getElementById("titulo-ambientes").innerHTML =
        `<i class="ti ti-building" aria-hidden="true"></i> Ambientes Donde se Usa
        <span style="
            float:right;
            font-size:14px;
            font-weight:600;
            background:#14b8a6;
            color:#fff;
            padding:2px 12px;
            border-radius:20px;
            vertical-align:middle;
            letter-spacing:0.3px;
        ">${lista.length} ${lista.length === 1 ? 'Laboratorio' : 'Laboratorios'}</span>`;

    let html = `

    <table class="tablaAmbientes">

        <thead>
            <tr>
                <th>Laboratorio</th>
                <th>Edificio</th>
                <th>Piso</th>
                <th>Aforo</th>
            </tr>
        </thead>

        <tbody>

    `;

    lista.forEach(ambiente => {

        const icono = ambiente.aforo === 'Variado'
            ? ''
            : `<i class="ti ti-users" style="font-size:14px;margin-right:5px;vertical-align:-1px;"></i>`;

        html += `
        <tr>
            <td>${ambiente.nombre}</td>
            <td><span class="aforo-badge"><i class="ti ti-building" style="font-size:14px;margin-right:5px;vertical-align:-1px;"></i>${ambiente.edificio}</span></td>
            <td><span class="aforo-badge"><i class="ti ti-stairs-up" style="font-size:14px;margin-right:5px;vertical-align:-1px;"></i>${ambiente.piso}</span></td>
            <td><span class="aforo-badge">${icono}${ambiente.aforo}</span></td>
        </tr>
        `;
    });

    html += `
        </tbody>
    </table>
    `;

    document
    .getElementById("ambientes")
    .innerHTML = html;
}

function filtrarProgramas(){

    let texto =
        document
        .getElementById("buscador")
        .value
        .toLowerCase();

    let filas =
        document.querySelectorAll(
            "#tablaProgramas tbody tr"
        );

    filas.forEach(fila => {

        let contenido =
            fila.innerText.toLowerCase();

        fila.style.display =
            contenido.includes(texto)
            ? ""
            : "none";
    });
}

</script>

</body>

</html>
